name: Benchmark

on: [push, pull_request]

jobs:
  benchmark:
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        neovim-version: ["stable"]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Mise
        uses: jdx/mise-action@v2

      - name: Benchmark
        run: |
          mise run -t aqua:neovim/neovim@${{ matrix.neovim-version }} benchmark
